{{ define "main" }}
<section>
  <div class="container">
    <div class="row clearfix">
      <div class="column">
        <h1>{{ .Title }}</h1>
        {{ .Content }}
        
        <ul class="post-list">
          {{ range .Pages }}
          <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            {{ if .Date }}
            <span class="post-date">{{ .Date.Format $.Site.Params.dateFormat }}</span>
            {{ end }}
            {{ with .Summary }}<div class="post-summary">{{ . }}</div>{{ end }}
          </li>
          {{ end }}
        </ul>

        {{ template "_internal/pagination.html" . }}
      </div>
    </div>
  </div>
</section>
{{ end }}
