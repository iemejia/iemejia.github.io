<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
    <link href="{{ "css/normalize.css" | relURL }}" rel="stylesheet" type="text/css" />
    <link href="{{ "css/default.css" | relURL }}?v={{ now.Unix }}" rel="stylesheet" type="text/css" />
    {{ block "head" . }}{{ end }}
  </head>

  <body>
    {{ partial "header.html" . }}
    
    <main>
      {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
    
    {{ block "scripts" . }}{{ end }}
  </body>
</html>
