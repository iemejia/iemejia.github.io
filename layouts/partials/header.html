<header>
  <nav class="clearfix">
    <a href="{{ "/" | relURL }}" id="pull" role="button" aria-controls="main-menu" aria-expanded="false">{{ .Site.Title }}</a>
    <ul class="clearfix" id="main-menu">
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL | relURL }}" class="section{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </nav>
</header>
