<script>
  document.addEventListener('DOMContentLoaded', function() {
    var pull = document.getElementById('pull');
    var menu = document.querySelector('nav ul');
    var nav = document.querySelector('nav');
    var lastScroll = 0;
    var scrollThreshold = 100;

    // Mobile menu toggle
    if (pull) {
      pull.addEventListener('click', function(e) {
        e.preventDefault();
        menu.classList.toggle('open');
      });
    }

    // Smooth scroll for section links
    document.querySelectorAll('.section').forEach(function(link) {
      link.addEventListener('click', function(e) {
        var href = this.getAttribute('href');
        // Only handle anchor links
        if (href.startsWith('#')) {
          e.preventDefault();
          // Close mobile menu if open
          if (window.getComputedStyle(pull).display !== 'none') {
            menu.classList.remove('open');
          }
          var target = document.querySelector(href);
          if (target) {
            target.scrollIntoView({ behavior: 'smooth' });
          }
        }
      });
    });

    // Show/hide nav on scroll (desktop only)
    window.addEventListener('scroll', function() {
      var currentScroll = window.pageYOffset;
      
      // Only apply scroll behavior on desktop
      if (window.innerWidth > 640) {
        if (currentScroll > scrollThreshold) {
          nav.classList.add('visible');
        } else {
          nav.classList.remove('visible');
        }
      }
      
      lastScroll = currentScroll;
    });

    // Reset menu on resize
    window.addEventListener('resize', function() {
      if (window.innerWidth > 640) {
        menu.classList.remove('open');
      } else {
        // Always show nav on mobile
        nav.classList.add('visible');
      }
    });

    // Initial check for mobile
    if (window.innerWidth <= 640) {
      nav.classList.add('visible');
    }
  });
</script>
